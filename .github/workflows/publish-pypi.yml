# Publica a PyPI en cada tag `vX.Y.Z`. Requiere `PYPI_API_TOKEN` configurado
# en Settings → Secrets and variables → Actions del repo.
#
# Si el secret no existe, el job falla con un mensaje claro (no rompe el
# release de Windows que vive en release.yml).

name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  pypi:
    name: Build + upload to PyPI
    runs-on: ubuntu-latest
    # Si querés un release sin publicar a PyPI, comentá este job o
    # configurá un environment con approval manual.
    environment: pypi
    permissions:
      contents: read
      id-token: write  # para Trusted Publishing (si se configura)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate package
        run: twine check dist/*

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$TWINE_PASSWORD" ]; then
            echo "::warning::PYPI_API_TOKEN no configurado. Saltando publicación."
            exit 0
          fi
          twine upload dist/*
